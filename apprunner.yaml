version: 1.0
runtime: python311
build:
  commands:
    build:
      - python3 -m venv /app/venv
      - /app/venv/bin/pip install -r requirements.txt
run:
  command: /app/venv/bin/uvicorn main:app --host 0.0.0.0 --port 3001 --log-level info
  network:
    port: 3001
  env:
    - name: PORT
      value: "3001"
    # Optional extra origins only; base list is baked into main.py (avoids ACAO:* + credentialed fetch).
    - name: CORS_ORIGIN
      value: "https://merch7am.com,https://www.merch7am.com,https://merch7am.myshopify.com"
    - name: CHAT_MODEL
      value: gpt-4o-mini
    - name: SHOPIFY_STORE_DOMAIN
      value: merch7am.myshopify.com
    - name: SHOPIFY_STORE_URL
      value: https://merch7am.com
    - name: RESEND_FROM_EMAIL
      value: info@merch7am.com
    - name: ADMIN_EMAIL
      value: info@merch7am.com
    - name: REPORT_EMAIL
      value: reportes@merch7am.com
    - name: DIGEST_EMAIL
      value: digest@merch7am.com
    - name: S3_BUCKET
      value: "merch7am-estimates"
    - name: S3_PREFIX
      value: "estimates/"
  secrets:
    - name: RESEND_API_KEY
      value-from: "arn:aws:secretsmanager:us-east-1:383021010759:secret:merch7am/resend-api-key-hpG0ov"
    - name: OPENAI_API_KEY
      value-from: "arn:aws:secretsmanager:us-east-1:383021010759:secret:merch7am/openai-api-key-2Oucjz"
    - name: SHOPIFY_STOREFRONT_TOKEN
      value-from: "arn:aws:secretsmanager:us-east-1:383021010759:secret:merch7am/shopify-storefront-token-SrJ4Yt"
